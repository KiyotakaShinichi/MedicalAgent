services:
  medical-agent:
    build: .
    container_name: medical-agent
    ports:
      - "8017:8017"
    env_file:
      - .env.example
    environment:
      APP_ENV: docker
      DATABASE_URL: sqlite:////app/Data/medical_agent.db
    volumes:
      - ./Data:/app/Data
      - ./KnowledgeBase:/app/KnowledgeBase
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8017/health', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
