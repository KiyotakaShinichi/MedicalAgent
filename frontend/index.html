<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Oncology Monitoring Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #0f172a;
      --card-bg: rgba(30, 41, 59, 0.7);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --accent: #38bdf8;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: 'Inter', sans-serif;
      background: var(--bg-color);
      background-image: 
        radial-gradient(circle at 15% 50%, rgba(56, 189, 248, 0.08), transparent 25%),
        radial-gradient(circle at 85% 30%, rgba(16, 185, 129, 0.08), transparent 25%);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 3rem 1rem;
    }

    .container {
      max-width: 1000px;
      width: 100%;
    }

    header {
      text-align: center;
      margin-bottom: 3rem;
      animation: fadeInDown 0.8s ease-out;
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 700;
      background: linear-gradient(to right, #38bdf8, #818cf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.5rem;
      letter-spacing: -0.02em;
    }

    p.subtitle {
      color: var(--text-muted);
      font-size: 1.1rem;
    }

    .dashboard {
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 2rem;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      animation: fadeInUp 0.8s ease-out 0.2s both;
    }

    .dashboard-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    h2 {
      font-size: 1.5rem;
      font-weight: 600;
      margin: 0;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    h2::before {
      content: '';
      display: block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background-color: var(--accent);
      box-shadow: 0 0 10px var(--accent);
    }

    .status-badge {
      background: rgba(56, 189, 248, 0.1);
      color: var(--accent);
      padding: 0.4rem 1rem;
      border-radius: 50px;
      font-size: 0.875rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      background-color: var(--accent);
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    pre {
      background: rgba(15, 23, 42, 0.6);
      padding: 1.5rem;
      border-radius: 12px;
      overflow-x: auto;
      color: #a5b4fc;
      font-family: 'Fira Code', monospace;
      font-size: 0.9rem;
      line-height: 1.5;
      border: 1px solid rgba(255, 255, 255, 0.03);
      box-shadow: inset 0 2px 4px 0 rgba(0, 0, 0, 0.2);
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    ::-webkit-scrollbar-track {
      background: rgba(15, 23, 42, 0.5); 
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(148, 163, 184, 0.3); 
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: rgba(148, 163, 184, 0.5); 
    }

    /* Animations */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(56, 189, 248, 0.7); }
      70% { box-shadow: 0 0 0 6px rgba(56, 189, 248, 0); }
      100% { box-shadow: 0 0 0 0 rgba(56, 189, 248, 0); }
    }

    /* Loader */
    .loader {
      display: inline-block;
      width: 50px;
      height: 50px;
      border: 3px solid rgba(255,255,255,.3);
      border-radius: 50%;
      border-top-color: var(--accent);
      animation: spin 1s ease-in-out infinite;
      margin: 2rem auto;
    }
    @keyframes spin {
      to { -webkit-transform: rotate(360deg); }
    }
    .loading-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem 0;
      color: var(--text-muted);
    }
  </style>
</head>
<body>
  
  <div class="container">
    <header>
      <h1>AI Oncology Dashboard</h1>
      <p class="subtitle">Real-time longitudinal patient monitoring and AI risk assessment</p>
    </header>

    <div class="dashboard">
      <div class="dashboard-header">
        <h2>Patient Report Data</h2>
        <div class="status-badge" id="statusBadge">
          <div class="status-dot"></div>
          <span id="statusText">Connecting</span>
        </div>
      </div>
      
      <div id="loading" class="loading-container">
        <div class="loader"></div>
        <p>Fetching clinical data from API...</p>
      </div>

      <pre id="report" style="display: none;"></pre>
    </div>
  </div>

  <script>
    fetch("http://127.0.0.1:8000/patient-report")
      .then(response => {
        if (!response.ok) throw new Error('Network response was not ok');
        return response.json();
      })
      .then(data => {
        document.getElementById("loading").style.display = "none";
        document.getElementById("report").style.display = "block";
        document.getElementById("report").textContent = JSON.stringify(data, null, 2);
        
        const badge = document.getElementById("statusBadge");
        const statusText = document.getElementById("statusText");
        
        statusText.textContent = "Live Update";
        badge.style.backgroundColor = "rgba(16, 185, 129, 0.1)";
        badge.style.color = "var(--success)";
        badge.querySelector('.status-dot').style.backgroundColor = "var(--success)";
      })
      .catch(error => {
        document.getElementById("loading").style.display = "none";
        const reportEl = document.getElementById("report");
        reportEl.style.display = "block";
        reportEl.style.color = "var(--danger)";
        reportEl.textContent = "Error loading report: " + error.message;
        
        const badge = document.getElementById("statusBadge");
        const statusText = document.getElementById("statusText");
        
        statusText.textContent = "Disconnected";
        badge.style.backgroundColor = "rgba(239, 68, 68, 0.1)";
        badge.style.color = "var(--danger)";
        badge.querySelector('.status-dot').style.backgroundColor = "var(--danger)";
        badge.querySelector('.status-dot').style.animation = "none";
      });
  </script>
</body>
</html>
