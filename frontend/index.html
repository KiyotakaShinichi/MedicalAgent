<!DOCTYPE html>
<html>
<head>
  <title>AI Oncology Monitoring Dashboard</title>
</head>
<body>
  <h1>AI Oncology Monitoring Dashboard</h1>

  <h2>Patient Report</h2>
  <pre id="report">Loading...</pre>

  <script>
    fetch("http://127.0.0.1:8000/patient-report")
      .then(response => response.json())
      .then(data => {
        document.getElementById("report").textContent =
          JSON.stringify(data, null, 2);
      })
      .catch(error => {
        document.getElementById("report").textContent =
          "Error loading report: " + error;
      });
  </script>
</body>
</html>

    <div class="dashboard">
      <div class="dashboard-header">
        <h2>Patient Report Data</h2>
        <div class="status-badge" id="statusBadge">
          <div class="status-dot"></div>
          <span id="statusText">Connecting</span>
        </div>
      </div>
      
      <div id="loading" class="loading-container">
        <div class="loader"></div>
        <p>Fetching clinical data from API...</p>
      </div>

      <pre id="report" style="display: none;"></pre>
    </div>
  </div>

  <script>
    fetch("http://127.0.0.1:8000/patient-report")
      .then(response => {
        if (!response.ok) throw new Error('Network response was not ok');
        return response.json();
      })
      .then(data => {
        document.getElementById("loading").style.display = "none";
        document.getElementById("report").style.display = "block";
        document.getElementById("report").textContent = JSON.stringify(data, null, 2);
        
        const badge = document.getElementById("statusBadge");
        const statusText = document.getElementById("statusText");
        
        statusText.textContent = "Live Update";
        badge.style.backgroundColor = "rgba(16, 185, 129, 0.1)";
        badge.style.color = "var(--success)";
        badge.querySelector('.status-dot').style.backgroundColor = "var(--success)";
      })
      .catch(error => {
        document.getElementById("loading").style.display = "none";
        const reportEl = document.getElementById("report");
        reportEl.style.display = "block";
        reportEl.style.color = "var(--danger)";
        reportEl.textContent = "Error loading report: " + error.message;
        
        const badge = document.getElementById("statusBadge");
        const statusText = document.getElementById("statusText");
        
        statusText.textContent = "Disconnected";
        badge.style.backgroundColor = "rgba(239, 68, 68, 0.1)";
        badge.style.color = "var(--danger)";
        badge.querySelector('.status-dot').style.backgroundColor = "var(--danger)";
        badge.querySelector('.status-dot').style.animation = "none";
      });
  </script>
</body>
</html>
